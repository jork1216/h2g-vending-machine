<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vending Machine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="main">
    <section class="vendo-page" id="vending-machine">
      <img class="title-image" src="images/title.png" alt="Vending Machine">
      <div class="machine">
      <img class="vending-machine" src="images/empty vending machine.png" alt="Vending machine">
      <div class="shelves" aria-hidden="true">
        <img class="shelf" src="images/shelf.png" alt="">
        <img class="shelf" src="images/shelf.png" alt="">
        <img class="shelf" src="images/shelf.png" alt="">
      </div>
      <div class="product-grid" aria-label="Product grid"></div>
      <img class="shiba" src="images/shiba inu.png" alt="Shiba Inu">
      </div>
    </section>  
    <section class="basket-section" aria-labelledby="basket-title">
      <div class="basket-panel">
        <header class="basket-header">
          <div class="basket-heading">
            <span class="basket-icon" aria-hidden="true"></span>
            <h2 id="basket-title">Your Picks <span class="basket-count">0</span></h2>
          </div>
          <button class="basket-clear" type="button">
            <span class="trash-icon" aria-hidden="true"></span>
            Clear All
          </button>
        </header>
        <div class="basket-list" aria-label="Order list items"></div>
        <p class="basket-empty" hidden>Your order list is empty.</p>
        <footer class="basket-footer">
          <div class="basket-total">
            <span>Total</span>
            <strong class="basket-total-price">&#8369;0.00</strong>
          </div>
          <button class="checkout-button" type="button">
            Proceed to Checkout
            <span aria-hidden="true">&rarr;</span>
          </button>
        </footer>
      </div>
    </section>
    <iframe class="receipt-frame" id="receipt" src="receipt.html" title="Cash receipt" hidden></iframe>
  </main>

  <script src="products.js"></script>
  <script src="script.js"></script>
</body>
</html>
